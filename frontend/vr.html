<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flys World VR</title>
    <link rel="stylesheet" href="/vr/style.css" />
  </head>
  <body>
    <main class="vr-shell">
      <section class="vr-card" aria-labelledby="vr-title">
        <p class="vr-kicker">Separate VR Prototype</p>
        <h1 id="vr-title">Flys World VR</h1>
        <p class="vr-copy">
          This is the safe Phase 1 VR route. The regular PC game stays on the main page, and this page is only a start screen for future WebXR work.
        </p>
        <button id="vr-start-button" type="button">Check VR Support</button>
        <p id="vr-status" class="vr-status" role="status">Preparing VR start screen...</p>
        <a class="vr-link" href="/">Back to PC Game</a>
      </section>
    </main>
    <script src="/vr/vr.js" defer></script>
  </body>
</html>
