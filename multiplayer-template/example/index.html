<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reusable Multiplayer Template Example</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, serif;
        background: linear-gradient(180deg, #eef5ff, #d6e4f6);
        color: #1c2630;
      }
      .shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }
      .panel {
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(28, 38, 48, 0.14);
        border-radius: 18px;
        padding: 16px;
        margin-bottom: 18px;
        box-shadow: 0 18px 40px rgba(29, 52, 77, 0.1);
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      input, button {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(28, 38, 48, 0.18);
        font: inherit;
      }
      button {
        cursor: pointer;
        background: #204b77;
        color: white;
      }
      #game {
        width: 100%;
        height: 420px;
        background: #12202d;
        border-radius: 18px;
        position: relative;
        overflow: hidden;
      }
      .player-dot {
        position: absolute;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        border: 2px solid rgba(255,255,255,0.85);
      }
      .label {
        position: absolute;
        transform: translate(-50%, -140%);
        color: white;
        font-size: 12px;
        white-space: nowrap;
      }
      ul {
        margin: 8px 0 0;
        padding-left: 20px;
      }
      code {
        background: rgba(32, 75, 119, 0.08);
        padding: 2px 6px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="panel">
        <h1>Reusable Multiplayer Template Example</h1>
        <p>This tiny demo lets us create or join lobbies and move a dot around live with arrow keys or WASD.</p>
      </div>

      <div class="panel">
        <div class="row">
          <input id="api-base" value="http://127.0.0.1:8100" />
          <input id="player-name" value="Player" />
          <input id="lobby-name" value="My Lobby" />
          <input id="lobby-code" placeholder="Private code or join code" />
          <button id="create-public">Create Public</button>
          <button id="create-private">Create Private</button>
          <button id="join-code">Join By Code</button>
          <button id="refresh-lobbies">Refresh Public Lobbies</button>
          <button id="leave-lobby">Leave</button>
        </div>
        <div id="status"></div>
        <div id="public-lobbies"></div>
      </div>

      <div class="panel">
        <h2>Live Example Arena</h2>
        <p>Move with <code>WASD</code> or arrow keys. Open this page in two tabs to test fast.</p>
        <div id="game"></div>
      </div>
    </div>

    <script type="module" src="./example-game.js"></script>
  </body>
  </html>
